{% extends 'base.html' %}

{% block content %}
<h2>Enrollments</h2>

<table border="1">
    <tr>
        <th>Student</th>
        <th>Course</th>
    </tr>

    {% for e in enrollments %}
    <tr>
        <td>{{ e.student }}</td>
        <td>{{ e.course_name }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

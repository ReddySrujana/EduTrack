{% extends 'base.html' %}

{% block content %}
<h2>Enrollments</h2>

<!-- Add new enrollment -->
<a href="{{ url_for('enroll') }}">➕ Enroll Student</a>

<br><br>

<table border="1" cellpadding="5">
    <tr>
        <th>Student</th>
        <th>Course</th>
        <th>Actions</th>
    </tr>

    {% for e in enrollments %}
    <tr>
        <td>{{ e.student }}</td>
        <td>{{ e.course_name }}</td>
        <td>
            <!-- Edit -->
            <a href="{{ url_for('edit_enrollment', student=e.student_id, course=e.course_id) }}">
                Edit
            </a>

            |

            <!-- Delete -->
            <a href="{{ url_for('delete_enrollment', student=e.student_id, course=e.course_id) }}"
               onclick="return confirm('Are you sure you want to remove this enrollment?')">
                Delete
            </a>
        </td>
    </tr>
    {% endfor %}

</table>

{% if enrollments|length == 0 %}
<p>No enrollments found.</p>
{% endif %}

{% endblock %}

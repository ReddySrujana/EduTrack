{% extends 'base.html' %}

{% block content %}
<h2>Search Users</h2>

<form method="POST">
    <input type="text" name="keyword" placeholder="Search name, email or role" required>
    <button type="submit">Search</button>
</form>

{% if results %}
<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
    </tr>

    {% for user in results %}
    <tr>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}

{% endblock %}

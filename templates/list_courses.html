{% extends 'base.html' %}

{% block content %}
<h2>Courses</h2>

<a href="{{ url_for('add_course') }}">➕ Add Course</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Course Name</th>
        <th>Instructor</th>
        <th>Actions</th>
    </tr>

    {% for course in courses %}
    <tr>
        <td>{{ course.course_id }}</td>
        <td>{{ course.course_name }}</td>
        <td>{{ course.instructor }}</td>
        <td>
            <a href="{{ url_for('edit_course', course_id=course.course_id) }}">Edit</a> |
            <a href="{{ url_for('delete_course', course_id=course.course_id) }}"
               onclick="return confirm('Delete this course?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

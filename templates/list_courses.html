{% extends 'base.html' %}

{% block content %}
<h2>Courses</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Course Name</th>
        <th>Instructor</th>
    </tr>

    {% for course in courses %}
    <tr>
        <td>{{ course.course_id }}</td>
        <td>{{ course.course_name }}</td>
        <td>{{ course.instructor }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<h2>Users</h2>

<a href="{{ url_for('add_user') }}">➕ Add User</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.user_id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>
        <td>
            <a href="{{ url_for('edit_user', user_id=user.user_id) }}">Edit</a> |
            <a href="{{ url_for('delete_user', user_id=user.user_id) }}"
               onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
